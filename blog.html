---
layout: page
title: Blog
---

  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <h2 class="post-list__title"><a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title | escape }}</a></h2>
        <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>
