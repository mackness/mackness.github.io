<ul>
{% for post in site.categories.book %} 
    <li>
      <a href="{{ post.url }}"><img src="{{ post.img-url}}" /></a>
      <p>{{ post.excerpt }}</p>

<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <p>{{ post.excerpt }}</p>
    </li>
  {% endfor %}
</ul>
