<!DOCTYPE html>
<html>
<head>
	<title>{% if page.title %} {{ page.title }} {% endif %} {{ site.name }}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="{{site.baseurl}}/css/main.css">
</head>
<body class="home">
<nav class="nav">
	<div class="nav__inner">
		<ul class="nav__menu nav__menu--left">
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="https://github.com/mackness">github</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="http://codepen.io/mackness">codepen</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="https://www.linkedin.com/in/macksolomon">linkedin</a></li>
		</ul>
		<ul class="nav__menu nav__menu--right">
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/">home</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/resume">resum&eacute;</a></li>
			<!-- <li class="nav__menu__item"><a class="nav__menu__anchor" href="/blog">blog</a></li> -->
			<li class="nav__menu__item"><a class="nav__menu__anchor nav__menu__anchor--contact" href="/contact">contact</a>
				<form id="contact-form" class="hidden">
					<div class="contact-form__input-block">
						<input type="text" class="contact-form__input contact-form__input--name" placeholder="Name" />
					</div>
					<div class="contact-form__input-block">
						<input type="text" class="contact-form__input contact-form__input--email" placeholder="Email" />
					</div>
					<div class="contact-form__input-block">
						<textarea type="text" class="contact-form__textarea" placeholder="Message"></textarea>
					</div>
					<button type="sumbmit" value="send" class="contact-form__submit">send</button>
				</form>
			</li>
		</ul>
	</div>
</nav>
<header class="header">
	<h1 class="header__headline">{{page.title}}</h1>
</header>
<section class="content {{page.title|slugify}}">

	{{content}}

</section>
<footer class="footer">
	<p class="footer__content">long live the web.</p>
</footer>
</body>
<script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.16/webfont.js"></script>
<script src="{{site.baseurl}}/js/baffle.min.js"></script>
<script src="{{site.baseurl}}/js/main.js" async defer></script>
<script type="text/javascript">
	baffle('.header__headline').start().reveal(1000, 1000);
	WebFont.load({
		google: {
			families: ['Roboto Mono']
		}
	});
</script>
<script>
  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
  (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
  m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
  })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

  ga('create', 'UA-83879776-1', 'auto');
  ga('send', 'pageview');

</script>
</html>
