<!DOCTYPE html>
<html>
<head>
	<title>{% if page.title %} {{ page.title }} {% endif %} {{ site.name }}</title>
	<link href='https://fonts.googleapis.com/css?family=Roboto+Mono:400,700' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" type="text/css" href="{{site.baseurl}}/css/main.css">
</head>
<body class="home">
<nav class="nav">
	<div class="nav__inner">
		<ul class="nav__menu nav__menu--left">
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="https://github.com/mackness">github</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="http://codepen.io/mackness">codepen</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="https://www.linkedin.com/in/macksolomon">linkedin</a></li>
		</ul>
		<ul class="nav__menu nav__menu--right">
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/">home</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/resume">resum&eacute;</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/blog">blog</a></li>
			<li class="nav__menu__item"><a class="nav__menu__anchor" href="/contact">contact</a></li>
		</ul>
	</div>
</nav>
<header class="header">
	<h1 class="header__headline">{{ page.title }}</h1>
</header>
<section class="content post {{page.title|slugify}}">

	{{content}}

</section>
<section class="disqus-block">
	<div id="disqus_thread"></div>
	<script>

	/**
	 *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
	 *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables */
	/*
	*/
	var disqus_config = function () {
	    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
	    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
	};
	(function() { // DON'T EDIT BELOW THIS LINE
	    var d = document, s = d.createElement('script');
	    s.src = '//http-mackness-github-io.disqus.com/embed.js';
	    s.setAttribute('data-timestamp', +new Date());
	    (d.head || d.body).appendChild(s);
	})();
	</script>
	<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</section>
<footer class="footer">
	<p class="footer__content">long live the web.</p>
</footer>
</body>
<script src="{{site.baseurl}}/js/baffle.min.js"></script>
<script src="{{site.baseurl}}/js/main.js"></script>
<script type="text/javascript">
	baffle('.header__headline').start().reveal(1000, 1000);
</script>
</html>
